name: CI

on:
  push:
    branches:
      - main
      - add-docker-and-demo-seed
  pull_request:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: login_template
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d login_template"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/login_template
      MAX_FAILED_LOGIN_ATTEMPTS: 5
      LOGIN_LOCK_DURATION_MS: 900000
      DEMO_USER_IDUSER: GL0001
      DEMO_USER_NAME: Demo
      DEMO_USER_SURNAME: Student
      DEMO_USER_NICKNAME: Demo
      DEMO_USER_AGE: 16
      DEMO_USER_GRADE_LEVEL: ม.4
      DEMO_USER_SCHOOL: Demo School
      DEMO_USER_PHONE: 0812345678
      DEMO_USER_PASSWORD: DemoPass123
      NEXT_PUBLIC_DEMO_IDUSER: GL0001
      NEXT_PUBLIC_DEMO_PASSWORD: DemoPass123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
